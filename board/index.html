<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Components Board</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="workbench">
      <section class="board-shell" id="panes">
        <aside class="tool-rail" aria-label="Board tools">
          <div class="rail-brand">C</div>
          <div class="tool-row">
            <button class="tool selected" data-tool="select"><span aria-hidden="true">↖</span>Select</button>
            <button class="tool" data-tool="place"><span aria-hidden="true">▣</span>Place device</button>
            <button class="tool" data-tool="connect"><span aria-hidden="true">⌁</span>Connect</button>
            <button class="tool" data-tool="guide"><span aria-hidden="true">↝</span>Guides</button>
            <button class="tool" data-tool="label"><span aria-hidden="true">T</span>Label</button>
            <button class="tool" data-tool="inspect"><span aria-hidden="true">⌕</span>Inspect</button>
          </div>
        </aside>

        <section class="board-stage">
          <header class="board-banner">
            <p><span aria-hidden="true">ⓘ</span> Canvas actions become checked Component operations.</p>
            <div class="top-actions">
              <strong id="component-name">Components Board</strong>
              <span id="save-state">Starting…</span>
              <button id="run-test" class="primary">Try inversion</button>
              <button id="reset-layout" title="Restore the Board view">Reset view</button>
            </div>
          </header>

          <article class="drawing-pane" id="drawing-pane">
            <p class="purpose" id="meaning">A small machine you can read, point at, and try.</p>
            <div id="board-canvas" class="board-canvas" aria-label="Component Drawing"></div>
            <section id="lens" class="lens" aria-live="polite">
              <strong>Start here</strong>
              <p>This is a NOT gate. It changes 0 into 1, and 1 into 0.</p>
              <button id="watch-output">Watch inverted output</button>
            </section>
          <form id="connect-form" class="connect-form hidden">
            <label>From <input id="connect-from" placeholder="U1.1Y" required></label>
            <label>To <input id="connect-to" placeholder="Observe.IN" required></label>
            <button class="primary" type="submit">Apply checked connection</button>
            <button id="close-connect" type="button">Cancel</button>
          </form>
          <section id="object-properties" class="object-properties hidden" role="dialog" aria-label="Object properties">
            <header><strong id="property-title">Object properties</strong><button id="close-properties" type="button" aria-label="Close properties">×</button></header>
            <p id="property-summary"></p>
            <form id="label-properties" class="hidden">
              <div class="label-property-row"><label>Size <input id="property-label-size" type="number" min="1.5" max="8" step=".5" required></label><label>Hex <input id="property-label-color-code" type="text" maxlength="7" pattern="#[0-9A-Fa-f]{6}" aria-label="Label hex color"></label><fieldset aria-label="Text style"><label title="Bold"><input id="property-label-bold" type="checkbox">B</label><label title="Italic"><input id="property-label-italic" type="checkbox">I</label><label title="Underline"><input id="property-label-underline" type="checkbox">U</label></fieldset></div>
              <div id="label-color-palette" class="label-color-palette" aria-label="16 color palette"></div>
              <div class="property-actions"><button class="primary" type="submit">OK</button><button id="cancel-properties" type="button">Cancel</button></div>
            </form>
          </section>
          </article>

          <section class="right-stack" aria-label="Component transaction overlay">
            <article class="pane text-pane" id="text-pane">
              <p class="queue-state"><span></span> Ready for checked preview</p>
            <textarea id="source" spellcheck="false" aria-label="Readable Component source"></textarea>
            <div id="diagnostics" class="diagnostics" aria-live="polite"></div>
            </article>

            <section class="terminal" id="terminal-pane" aria-label="Hidden Board activity console">
            <div class="terminal-head"><span>Terminal</span><button id="terminal-expand">Expand</button></div>
            <div id="terminal-log" class="terminal-log" aria-live="polite"></div>
            <form id="terminal-form" class="terminal-form">
              <span>&gt;</span><input id="terminal-input" autocomplete="off" placeholder="Try: run inversion" aria-label="Component command">
              <button class="primary">Send</button>
            </form>
            <div class="suggestions"><button data-command="run inversion">Try inversion</button><button data-command="drive Clock.CLK 0">Set input to 0</button><button data-command="watch inverted_level">Watch output</button></div>
            </section>
          </section>
        </section>
      </section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
