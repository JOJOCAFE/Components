<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 940" role="img" aria-labelledby="title desc">
  <title id="title">74HC04 functional DIP pinout</title>
  <desc id="desc">74HC04 hex inverter in DIP-14. Each inverter input and output is visibly wired to its matching package pin; pins 14 and 7 are VCC and GND.</desc>
  <style>
    .body{fill:#fff;stroke:#000;stroke-width:12.5}.lead{stroke:#787878;stroke-width:9.72;stroke-linecap:round}.pin{fill:none;stroke:none}.name{font:30px "Droid Sans",Arial,sans-serif;fill:#444}.number{font:30px "Droid Sans",Arial,sans-serif;fill:#666}.title{font:44px "Droid Sans",Arial,sans-serif;fill:#111}.wire{fill:none;stroke:#1769aa;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}.gate{fill:#fff;stroke:#111;stroke-width:7}.bubble{fill:#fff;stroke:#111;stroke-width:7}
  </style>
  <text class="title" x="550" y="906" text-anchor="middle">74HC04 · HEX INVERTER · DIP-14</text>
  <rect class="body" x="200" y="30" width="700" height="790" rx="4"/>
  <path d="M515 30a35 35 0 0 0 70 0" fill="none" stroke="#000" stroke-width="12.5"/>

  <!-- External package pins: connector rectangles retain the frame's connection geometry. -->
  <g>
    <line class="lead" x1="5" y1="100" x2="200" y2="100"/><rect class="pin" id="connector0pin" data-pin-number="1" data-pin-name="1A" data-component-pin="pin-1" data-component-selector="@1" data-component-port="1A" data-direction="input" x="5" y="95" width="195" height="10"/><text class="name" x="220" y="85">1A</text><text class="number" x="100" y="85" text-anchor="middle">1</text>
    <line class="lead" x1="5" y1="200" x2="200" y2="200"/><rect class="pin" id="connector1pin" data-pin-number="2" data-pin-name="1Y" data-component-pin="pin-2" data-component-selector="@2" data-component-port="1Y" data-direction="output" x="5" y="195" width="195" height="10"/><text class="name" x="220" y="185">1Y</text><text class="number" x="100" y="185" text-anchor="middle">2</text>
    <line class="lead" x1="5" y1="300" x2="200" y2="300"/><rect class="pin" id="connector2pin" data-pin-number="3" data-pin-name="2A" data-component-pin="pin-3" data-component-selector="@3" data-component-port="2A" data-direction="input" x="5" y="295" width="195" height="10"/><text class="name" x="220" y="285">2A</text><text class="number" x="100" y="285" text-anchor="middle">3</text>
    <line class="lead" x1="5" y1="400" x2="200" y2="400"/><rect class="pin" id="connector3pin" data-pin-number="4" data-pin-name="2Y" data-component-pin="pin-4" data-component-selector="@4" data-component-port="2Y" data-direction="output" x="5" y="395" width="195" height="10"/><text class="name" x="220" y="385">2Y</text><text class="number" x="100" y="385" text-anchor="middle">4</text>
    <line class="lead" x1="5" y1="500" x2="200" y2="500"/><rect class="pin" id="connector4pin" data-pin-number="5" data-pin-name="3A" data-component-pin="pin-5" data-component-selector="@5" data-component-port="3A" data-direction="input" x="5" y="495" width="195" height="10"/><text class="name" x="220" y="485">3A</text><text class="number" x="100" y="485" text-anchor="middle">5</text>
    <line class="lead" x1="5" y1="600" x2="200" y2="600"/><rect class="pin" id="connector5pin" data-pin-number="6" data-pin-name="3Y" data-component-pin="pin-6" data-component-selector="@6" data-component-port="3Y" data-direction="output" x="5" y="595" width="195" height="10"/><text class="name" x="220" y="585">3Y</text><text class="number" x="100" y="585" text-anchor="middle">6</text>
    <line class="lead" x1="5" y1="700" x2="200" y2="700"/><rect class="pin" id="connector6pin" data-pin-number="7" data-pin-name="GND" data-component-pin="pin-7" data-component-selector="@7" data-component-port="GND" data-direction="power" x="5" y="695" width="195" height="10"/><text class="name" x="220" y="685">GND</text><text class="number" x="100" y="685" text-anchor="middle">7</text>
    <line class="lead" x1="900" y1="700" x2="1095" y2="700"/><rect class="pin" id="connector7pin" data-pin-number="8" data-pin-name="4Y" data-component-pin="pin-8" data-component-selector="@8" data-component-port="4Y" data-direction="output" x="900" y="695" width="195" height="10"/><text class="name" x="880" y="685" text-anchor="end">4Y</text><text class="number" x="1000" y="685" text-anchor="middle">8</text>
    <line class="lead" x1="900" y1="600" x2="1095" y2="600"/><rect class="pin" id="connector8pin" data-pin-number="9" data-pin-name="4A" data-component-pin="pin-9" data-component-selector="@9" data-component-port="4A" data-direction="input" x="900" y="595" width="195" height="10"/><text class="name" x="880" y="585" text-anchor="end">4A</text><text class="number" x="1000" y="585" text-anchor="middle">9</text>
    <line class="lead" x1="900" y1="500" x2="1095" y2="500"/><rect class="pin" id="connector9pin" data-pin-number="10" data-pin-name="5Y" data-component-pin="pin-10" data-component-selector="@10" data-component-port="5Y" data-direction="output" x="900" y="495" width="195" height="10"/><text class="name" x="880" y="485" text-anchor="end">5Y</text><text class="number" x="1000" y="485" text-anchor="middle">10</text>
    <line class="lead" x1="900" y1="400" x2="1095" y2="400"/><rect class="pin" id="connector10pin" data-pin-number="11" data-pin-name="5A" data-component-pin="pin-11" data-component-selector="@11" data-component-port="5A" data-direction="input" x="900" y="395" width="195" height="10"/><text class="name" x="880" y="385" text-anchor="end">5A</text><text class="number" x="1000" y="385" text-anchor="middle">11</text>
    <line class="lead" x1="900" y1="300" x2="1095" y2="300"/><rect class="pin" id="connector11pin" data-pin-number="12" data-pin-name="6Y" data-component-pin="pin-12" data-component-selector="@12" data-component-port="6Y" data-direction="output" x="900" y="295" width="195" height="10"/><text class="name" x="880" y="285" text-anchor="end">6Y</text><text class="number" x="1000" y="285" text-anchor="middle">12</text>
    <line class="lead" x1="900" y1="200" x2="1095" y2="200"/><rect class="pin" id="connector12pin" data-pin-number="13" data-pin-name="6A" data-component-pin="pin-13" data-component-selector="@13" data-component-port="6A" data-direction="input" x="900" y="195" width="195" height="10"/><text class="name" x="880" y="185" text-anchor="end">6A</text><text class="number" x="1000" y="185" text-anchor="middle">13</text>
    <line class="lead" x1="900" y1="100" x2="1095" y2="100"/><rect class="pin" id="connector13pin" data-pin-number="14" data-pin-name="VCC" data-component-pin="pin-14" data-component-selector="@14" data-component-port="VCC" data-direction="power" x="900" y="95" width="195" height="10"/><text class="name" x="880" y="85" text-anchor="end">VCC</text><text class="number" x="1000" y="85" text-anchor="middle">14</text>
  </g>

  <!-- Exact inverter geometry and return routes from 74hc04-internal.svg, enlarged to this frame. -->
  <g class="wire">
    <!-- 1A (1) to 1Y (2); 2A (3) to 2Y (4); 3A (5) to 3Y (6). -->
    <path d="M200 100H305.6"/><path d="M438 100H472.8V200H200"/>
    <path d="M200 300H305.6"/><path d="M438 300H472.8V400H200"/>
    <path d="M200 500H305.6"/><path d="M438 500H472.8V600H200"/>
    <!-- 6A (13) to 6Y (12); 5A (11) to 5Y (10); 4A (9) to 4Y (8). -->
    <path d="M900 200H741.6"/><path d="M609.6 200H574.4V300H900"/>
    <path d="M900 400H741.6"/><path d="M609.6 400H574.4V500H900"/>
    <path d="M900 600H741.6"/><path d="M609.6 600H574.4V700H900"/>
  </g>
  <!-- These six gates preserve the original 74hc04-internal.svg triangle and output-bubble proportions. -->
  <g>
    <path class="gate" d="M305.6 45.45l105.6 54.55-105.6 54.55z"/><circle class="bubble" cx="424.8" cy="100" r="13.6"/>
    <path class="gate" d="M305.6 245.45l105.6 54.55-105.6 54.55z"/><circle class="bubble" cx="424.8" cy="300" r="13.6"/>
    <path class="gate" d="M305.6 445.45l105.6 54.55-105.6 54.55z"/><circle class="bubble" cx="424.8" cy="500" r="13.6"/>
    <path class="gate" d="M741.6 145.45l-105.6 54.55 105.6 54.55z"/><circle class="bubble" cx="622.8" cy="200" r="13.6"/>
    <path class="gate" d="M741.6 345.45l-105.6 54.55 105.6 54.55z"/><circle class="bubble" cx="622.8" cy="400" r="13.6"/>
    <path class="gate" d="M741.6 545.45l-105.6 54.55 105.6 54.55z"/><circle class="bubble" cx="622.8" cy="600" r="13.6"/>
  </g>
</svg>
