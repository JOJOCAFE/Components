<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 940" role="img" aria-labelledby="title desc">
<title id="title">74HC02 functional DIP pinout</title><desc id="desc">74HC02 quad two-input NOR gate in DIP-14. Each standard OR-shaped gate has an output inversion bubble and routes to its physical pins.</desc>
<style>.body{fill:#fff;stroke:#000;stroke-width:12.5}.lead{stroke:#787878;stroke-width:9.72;stroke-linecap:round}.pin{fill:none;stroke:none}.name{font:30px Arial,sans-serif;fill:#444}.number{font:30px Arial,sans-serif;fill:#666}.title{font:44px Arial,sans-serif;fill:#111}.wire{fill:none;stroke:#1769aa;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}.gate{fill:#fff;stroke:#111;stroke-width:7}.bubble{fill:#fff;stroke:#111;stroke-width:7}</style>
<text class="title" x="550" y="906" text-anchor="middle">74HC02 · QUAD 2-INPUT NOR · DIP-14</text><rect class="body" x="200" y="30" width="700" height="790" rx="4"/><path d="M515 30a35 35 0 0 0 70 0" fill="none" stroke="#000" stroke-width="12.5"/>
<g>
<line class="lead" x1="5" y1="100" x2="200" y2="100"/><rect class="pin" id="connector0pin" data-pin-number="1" data-pin-name="1Y" data-component-pin="pin-1" data-component-selector="@1" data-component-port="1Y" x="5" y="95" width="195" height="10"/><text class="name" x="220" y="85">1Y</text><text class="number" x="100" y="85" text-anchor="middle">1</text>
<line class="lead" x1="5" y1="200" x2="200" y2="200"/><rect class="pin" id="connector1pin" data-pin-number="2" data-pin-name="1A" data-component-pin="pin-2" data-component-selector="@2" data-component-port="1A" x="5" y="195" width="195" height="10"/><text class="name" x="220" y="185">1A</text><text class="number" x="100" y="185" text-anchor="middle">2</text>
<line class="lead" x1="5" y1="300" x2="200" y2="300"/><rect class="pin" id="connector2pin" data-pin-number="3" data-pin-name="1B" data-component-pin="pin-3" data-component-selector="@3" data-component-port="1B" x="5" y="295" width="195" height="10"/><text class="name" x="220" y="285">1B</text><text class="number" x="100" y="285" text-anchor="middle">3</text>
<line class="lead" x1="5" y1="400" x2="200" y2="400"/><rect class="pin" id="connector3pin" data-pin-number="4" data-pin-name="2Y" data-component-pin="pin-4" data-component-selector="@4" data-component-port="2Y" x="5" y="395" width="195" height="10"/><text class="name" x="220" y="385">2Y</text><text class="number" x="100" y="385" text-anchor="middle">4</text>
<line class="lead" x1="5" y1="500" x2="200" y2="500"/><rect class="pin" id="connector4pin" data-pin-number="5" data-pin-name="2A" data-component-pin="pin-5" data-component-selector="@5" data-component-port="2A" x="5" y="495" width="195" height="10"/><text class="name" x="220" y="485">2A</text><text class="number" x="100" y="485" text-anchor="middle">5</text>
<line class="lead" x1="5" y1="600" x2="200" y2="600"/><rect class="pin" id="connector5pin" data-pin-number="6" data-pin-name="2B" data-component-pin="pin-6" data-component-selector="@6" data-component-port="2B" x="5" y="595" width="195" height="10"/><text class="name" x="220" y="585">2B</text><text class="number" x="100" y="585" text-anchor="middle">6</text>
<line class="lead" x1="5" y1="700" x2="200" y2="700"/><rect class="pin" id="connector6pin" data-pin-number="7" data-pin-name="GND" data-component-pin="pin-7" data-component-selector="@7" data-component-port="GND" x="5" y="695" width="195" height="10"/><text class="name" x="220" y="685">GND</text><text class="number" x="100" y="685" text-anchor="middle">7</text>
<line class="lead" x1="900" y1="700" x2="1095" y2="700"/><rect class="pin" id="connector7pin" data-pin-number="8" data-pin-name="3A" data-component-pin="pin-8" data-component-selector="@8" data-component-port="3A" x="900" y="695" width="195" height="10"/><text class="name" x="880" y="685" text-anchor="end">3A</text><text class="number" x="1000" y="685" text-anchor="middle">8</text>
<line class="lead" x1="900" y1="600" x2="1095" y2="600"/><rect class="pin" id="connector8pin" data-pin-number="9" data-pin-name="3B" data-component-pin="pin-9" data-component-selector="@9" data-component-port="3B" x="900" y="595" width="195" height="10"/><text class="name" x="880" y="585" text-anchor="end">3B</text><text class="number" x="1000" y="585" text-anchor="middle">9</text>
<line class="lead" x1="900" y1="500" x2="1095" y2="500"/><rect class="pin" id="connector9pin" data-pin-number="10" data-pin-name="3Y" data-component-pin="pin-10" data-component-selector="@10" data-component-port="3Y" x="900" y="495" width="195" height="10"/><text class="name" x="880" y="485" text-anchor="end">3Y</text><text class="number" x="1000" y="485" text-anchor="middle">10</text>
<line class="lead" x1="900" y1="400" x2="1095" y2="400"/><rect class="pin" id="connector10pin" data-pin-number="11" data-pin-name="4A" data-component-pin="pin-11" data-component-selector="@11" data-component-port="4A" x="900" y="395" width="195" height="10"/><text class="name" x="880" y="385" text-anchor="end">4A</text><text class="number" x="1000" y="385" text-anchor="middle">11</text>
<line class="lead" x1="900" y1="300" x2="1095" y2="300"/><rect class="pin" id="connector11pin" data-pin-number="12" data-pin-name="4B" data-component-pin="pin-12" data-component-selector="@12" data-component-port="4B" x="900" y="295" width="195" height="10"/><text class="name" x="880" y="285" text-anchor="end">4B</text><text class="number" x="1000" y="285" text-anchor="middle">12</text>
<line class="lead" x1="900" y1="200" x2="1095" y2="200"/><rect class="pin" id="connector12pin" data-pin-number="13" data-pin-name="4Y" data-component-pin="pin-13" data-component-selector="@13" data-component-port="4Y" x="900" y="195" width="195" height="10"/><text class="name" x="880" y="185" text-anchor="end">4Y</text><text class="number" x="1000" y="185" text-anchor="middle">13</text>
<line class="lead" x1="900" y1="100" x2="1095" y2="100"/><rect class="pin" id="connector13pin" data-pin-number="14" data-pin-name="VCC" data-component-pin="pin-14" data-component-selector="@14" data-component-port="VCC" x="900" y="95" width="195" height="10"/><text class="name" x="880" y="85" text-anchor="end">VCC</text><text class="number" x="1000" y="85" text-anchor="middle">14</text>
</g>
<!-- The PNG has four upward-facing NOR gates: their bubbles are on the top output, not at a side. -->
<g class="wire">
  <!-- 1A, 2A, 4B, and 3B: three turns in the source trace. -->
  <path d="M200 200H330V285H400V263"/><path d="M200 500H330V585H400V563"/>
  <path d="M900 300H770V385H700V363"/><path d="M900 600H770V685H700V663"/>
  <!-- 1B, 2B, 4A, and 3A: one turn in the source trace. -->
  <path d="M200 300H460V263"/><path d="M200 600H460V563"/>
  <path d="M900 400H640V363"/><path d="M900 700H640V663"/>
  <!-- Every output rises from its top bubble, then takes three turns to its pin. -->
  <path d="M430 120V80H360V100H200"/><path d="M430 420V380H360V400H200"/>
  <path d="M670 220V180H740V200H900"/><path d="M670 520V480H740V500H900"/>
</g>
<!-- Standard OR outlines rotated upward, plus the source's top output bubbles: NOR gates. -->
<g><path class="gate" d="M390 270Q430 245 470 270Q465 210 430 160Q395 210 390 270Z"/><circle class="bubble" cx="430" cy="140" r="20"/><path class="gate" d="M390 570Q430 545 470 570Q465 510 430 460Q395 510 390 570Z"/><circle class="bubble" cx="430" cy="440" r="20"/><path class="gate" d="M630 370Q670 345 710 370Q705 310 670 260Q635 310 630 370Z"/><circle class="bubble" cx="670" cy="240" r="20"/><path class="gate" d="M630 670Q670 645 710 670Q705 610 670 560Q635 610 630 670Z"/><circle class="bubble" cx="670" cy="540" r="20"/></g>
</svg>
