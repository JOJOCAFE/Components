<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 940" role="img" aria-labelledby="title desc">
  <title id="title">74HC30 definition-backed DIP frame</title>
  <desc id="desc">74HC30 DIP pin frame. Frame style adapted from https://github.com/Adr-hyng/74LS-Series-Fritzing-Parts/tree/main/Schematic under CC BY-SA 3.0; local Components definition provides all pin truth.</desc>
  <style>.body{fill:#fff;stroke:#000;stroke-width:12.5}.lead{stroke:#787878;stroke-width:9.72;stroke-linecap:round}.pin{fill:none;stroke:none}.name{font:50px "Droid Sans",Arial,sans-serif;fill:#444}.number{font:30px "Droid Sans",Arial,sans-serif;fill:#666}.title{font:44px "Droid Sans",Arial,sans-serif;fill:#111}</style>
