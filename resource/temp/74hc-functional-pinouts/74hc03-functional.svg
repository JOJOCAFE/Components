<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 940" role="img" aria-labelledby="title desc">
<title id="title">74HC03 functional DIP pinout</title><desc id="desc">74HC03 quad two-input open-collector NAND gates in DIP-14. Each output has an inversion bubble and open-collector mark.</desc>
<style>.body{fill:#fff;stroke:#000;stroke-width:12.5}.lead{stroke:#787878;stroke-width:9.72;stroke-linecap:round}.pin{fill:none;stroke:none}.name{font:30px "Droid Sans",Arial,sans-serif;fill:#444}.number{font:30px "Droid Sans",Arial,sans-serif;fill:#666}.title{font:44px "Droid Sans",Arial,sans-serif;fill:#111}.wire{fill:none;stroke:#1769aa;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}.gate{fill:#fff;stroke:#111;stroke-width:7}.bubble{fill:#fff;stroke:#111;stroke-width:7}.od{fill:none;stroke:#111;stroke-width:4;stroke-linecap:round}</style>
<text class="title" x="550" y="906" text-anchor="middle">74HC03 · QUAD OPEN-COLLECTOR NAND · DIP-14</text><rect class="body" x="200" y="30" width="700" height="790" rx="4"/><path d="M515 30a35 35 0 0 0 70 0" fill="none" stroke="#000" stroke-width="12.5"/>
<g>
