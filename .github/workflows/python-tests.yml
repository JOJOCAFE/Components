name: Python tests

on:
  push:
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run Python tests
        working-directory: python
        run: |
          python3 -B -m tests.test_chips
          python3 -B -m tests.test_generated_split_records
          python3 -B -m tests.test_generated_audit_reports
          python3 -B -m tests.test_design
          python3 -B -m tests.test_block_ui
          python3 -B -m tests.test_netlist
          python3 -B -m tests.test_model_loader
          python3 -B -m tests.test_circuit_package
          python3 -B -m tests.test_circuit_runner
          python3 -B -m tests.test_circuit_runner_student_contract
          python3 -B -m tests.test_circuit_runner_packages
          python3 -B -m tests.test_circuit_hierarchy
          python3 -B -m tests.test_timing_profile
          python3 -B -m tests.test_event_scheduler
          python3 -B -m tests.test_timed_runner
          python3 -B -m tests.test_circuit_timing
          python3 -B -m tests.test_virtual_runtime
          python3 -B -m tests.test_lib_circuits
          python3 -B -m tests.test_lib_circuit_sources
          python3 -B -m tests.test_lib_circuit_coverage
          python3 -B -m tests.test_lib_circuit_endpoints
          python3 -B -m tests.test_lib_circuit_models
          python3 -B -m tests.test_lib_circuit_campaign
          python3 -B -m tests.test_cli
          python3 -B -m tests.test_api
          python3 -B -m tests.test_db
          python3 -B -m tests.test_contracts
          python3 -B -m tests.test_simulation_service
          python3 -B -m tests.test_equivalence
          python3 -B -m tests.test_verilog_behavior_crosscheck

      - name: Run stateful chip behavior cross-check
        run: |
          PYTHONPATH=python python3 tools/state_behavior_crosscheck.py
